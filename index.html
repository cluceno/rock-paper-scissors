<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="container">

        <div id="welcome">
            
            <h1 id="invite">Let's Play Rock, Paper, Scissors!</h1>

            <h4 id="prompt">Make a choice:</h4>

        </div>

        <div class="choices">
            <button data-choice="rock">Rock</button>
            <button data-choice="paper">Paper</button>
            <button data-choice="scissors">Scissors</button>
        </div>

        <div class="scoreUpdates">
            <div id="roundResult"></div>
            <div id="runningScore"></div>
            <div id="finalScore"></div>
        </div>

        <div id="playAgain">
            <button id="reset">Play again?</button>
        </div>

    </div>

</body>
</html>
